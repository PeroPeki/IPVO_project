services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entrypoint=metrics"
      - "--entrypoints.metrics.address=:8082"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-net

  backend:
    build: ./backend
    container_name: backend
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      # API + Socket.IO + Prometheus metrike
      - 'traefik.http.routers.api.rule=Host("localhost") && (PathPrefix("/api") || PathPrefix("/socket.io") || PathPrefix("/metrics"))'
      - "traefik.http.routers.api.priority=100"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_HOST=redis
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - CLOUDINARY_URL=${CLOUDINARY_URL:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  admin:
    build: ./admin
    container_name: admin
    labels:
      - "traefik.enable=true"
      - 'traefik.http.routers.admin.rule=Host("admin.localhost")'
      - "traefik.http.routers.admin.entrypoints=web"
      - "traefik.http.services.admin.loadbalancer.server.port=80"
    depends_on:
      - backend
    networks:
      - app-net

  analytics_worker:
    build: ./backend
    container_name: analytics_worker
    command: celery -A tasks worker --beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_HOST=redis
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - app-net

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - app-net

volumes:
  mongo_data: {}
  uploads: {}

networks:
  app-net:
    driver: bridge
