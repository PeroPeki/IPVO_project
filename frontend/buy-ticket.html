<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kupi kartu</title>
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <div class="container">
        <div class="header">
            <button id="backBtn" class="back-btn">← Natrag</button>
            <h2>Kupnja karte</h2>
        </div>

        <div id="buySection" class="ticket-card event-detail">
            <div id="eventLoading" class="loading-state">Učitavanje eventa...</div>
            <div id="eventDetails" class="hidden"></div>
            <button id="buyBtn" class="buy-btn hidden">💳 Kupi kartu</button>
            <p id="message" class="message"></p>
        </div>

        <div id="bookingInfo" class="booking-info hidden">
            <h3>✅ Karta uspješno kupljena!</h3>
            <button id="viewTablesBtn" class="btn-primary">Pogledaj stolove</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('event_id');
        const eventName = urlParams.get('event_name') || '';
        const clubName = urlParams.get('club_name') || '';
        const username = localStorage.getItem('username');

        function checkUser() {
            if (!username) {
                window.location.href = '/index.html';
                return false;
            }
            return true;
        }

        function formatDate(raw) {
            if (!raw) return 'Datum: nepoznat';
            try {
                const d = new Date(raw);
                if (isNaN(d.getTime())) return raw;
                return d.toLocaleString('hr-HR', {
                    weekday: 'long', day: '2-digit', month: 'long', year: 'numeric',
                    hour: '2-digit', minute: '2-digit',
                });
            } catch { return raw; }
        }

        async function loadEventDetails() {
            const loading = document.getElementById('eventLoading');
            const details = document.getElementById('eventDetails');
            const buyBtn = document.getElementById('buyBtn');

            try {
                const res = await fetch(`/api/events/${encodeURIComponent(eventId)}`);
                if (!res.ok) throw new Error('Event nije pronađen');
                const ev = await res.json();

                let priceLine = '';
                if (ev.current_price || ev.base_price) {
                    const cur = ev.current_price ?? ev.base_price;
                    const isHigh = ev.base_price && cur > ev.base_price * 1.2;
                    priceLine = `
                        <div class="price-block">
                            <div class="price-line">
                                <span>Trenutna cijena rezervacije:</span>
                                <strong>${Number(cur).toFixed(2)} EUR</strong>
                            </div>
                            ${ev.base_price ? `<div class="price-line muted"><span>Bazna cijena:</span><span>${Number(ev.base_price).toFixed(2)} EUR</span></div>` : ''}
                            ${isHigh ? '<div class="hot-badge">🔥 Visoka potražnja – cijena bi mogla porasti</div>' : ''}
                        </div>
                    `;
                }

                const lastfmLine = (ev.artist_listeners || ev.artist_playcount) ? `
                    <div class="lastfm-block">
                        <strong>📊 Last.fm popularnost:</strong>
                        <span>${(ev.artist_listeners || 0).toLocaleString('en-US')} slušatelja · ${(ev.artist_playcount || 0).toLocaleString('en-US')} reprodukcija</span>
                    </div>
                ` : '';

                details.innerHTML = `
                    ${ev.image_url ? `<img src="${ev.image_url}" alt="${ev.name}" class="event-hero"/>` : ''}
                    <h3 class="event-headline">${ev.name || eventName}</h3>
                    <div class="detail-row"><span>🎤 Izvođač:</span><strong>${ev.artist_name || 'N/A'}</strong></div>
                    <div class="detail-row"><span>📅 Datum:</span><strong>${formatDate(ev.event_date || ev.date)}</strong></div>
                    <div class="detail-row"><span>📍 Venue:</span><strong>${ev.venue_name || clubName}${ev.venue_address ? ', ' + ev.venue_address : ''}</strong></div>
                    <div class="detail-row"><span>🌍 Lokacija:</span><strong>${[ev.city, ev.country_name || ev.country].filter(Boolean).join(', ')}</strong></div>
                    ${ev.venue_capacity ? `<div class="detail-row"><span>👥 Kapacitet:</span><strong>${ev.venue_capacity.toLocaleString('en-US')}</strong></div>` : ''}
                    ${ev.tm_genre || ev.genre_name ? `<div class="detail-row"><span>🎵 Žanr:</span><strong>${ev.tm_genre || ev.genre_name}</strong></div>` : ''}
                    ${ev.days_until_event != null ? `<div class="detail-row"><span>⏱️ Dana do eventa:</span><strong>${ev.days_until_event}</strong></div>` : ''}
                    ${lastfmLine}
                    ${priceLine}
                    ${ev.info ? `<p class="event-info">${ev.info}</p>` : ''}
                    ${ev.url ? `<a href="${ev.url}" target="_blank" rel="noopener" class="tm-link big">↗ Otvori na Ticketmasteru</a>` : ''}
                    <hr>
                    <p class="muted">Kupnjom karte dobivate pristup rezervaciji stolova za ovaj event.</p>
                    <p class="muted"><strong>Korisnik:</strong> ${username}</p>
                `;

                loading.style.display = 'none';
                details.classList.remove('hidden');
                buyBtn.classList.remove('hidden');
            } catch (err) {
                loading.textContent = '❌ ' + err.message;
            }
        }

        async function checkAlreadyHasTicket() {
            try {
                const res = await fetch(`/api/users/${username}/has-ticket/${encodeURIComponent(eventId)}`);
                const data = await res.json();
                if (data.hasTicket) {
                    document.getElementById('buySection').style.display = 'none';
                    document.getElementById('bookingInfo').classList.remove('hidden');
                    document.getElementById('viewTablesBtn').addEventListener('click', () => {
                        window.location.href = `/tables.html?event_id=${encodeURIComponent(eventId)}&event_name=${encodeURIComponent(eventName)}`;
                    });
                    return true;
                }
                return false;
            } catch (err) {
                console.error('Greška pri provjeri karte:', err);
                return false;
            }
        }

        function buyTicket() {
            const buyBtn = document.getElementById('buyBtn');
            buyBtn.disabled = true;
            buyBtn.textContent = 'Obrađujem...';

            fetch(`/api/users/${username}/buy-ticket/${encodeURIComponent(eventId)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('buySection').style.display = 'none';
                    document.getElementById('bookingInfo').classList.remove('hidden');
                    document.getElementById('viewTablesBtn').addEventListener('click', () => {
                        window.location.href = `/tables.html?event_id=${encodeURIComponent(eventId)}&event_name=${encodeURIComponent(eventName)}`;
                    });
                } else {
                    document.getElementById('message').textContent = '❌ ' + (data.message || 'Neuspješna kupnja');
                    buyBtn.disabled = false;
                    buyBtn.textContent = '💳 Kupi kartu';
                }
            })
            .catch(err => {
                document.getElementById('message').textContent = '❌ Greška: ' + err.message;
                buyBtn.disabled = false;
                buyBtn.textContent = '💳 Kupi kartu';
            });
        }

        document.getElementById('backBtn').onclick = () => window.history.back();
        document.getElementById('buyBtn').addEventListener('click', buyTicket);

        async function init() {
            if (!checkUser()) return;
            const hasTicket = await checkAlreadyHasTicket();
            if (!hasTicket) {
                await loadEventDetails();
            }
        }

        init();
    </script>
</body>
</html>
