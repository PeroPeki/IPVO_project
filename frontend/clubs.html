<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Nightlife – Odaberi venue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-top">
            <h1>🌍 Globalni venues</h1>
            <div class="user-info">
                Korisnik: <strong id="userDisplay"></strong>
                <button id="logoutBtn" class="logout-btn">Odjava</button>
            </div>
        </div>

        <div class="filter-bar">
            <input id="cityFilter" type="text" placeholder="Filtriraj grad (npr. London)" />
            <select id="countryFilter">
                <option value="">Sve države</option>
            </select>
            <button id="filterBtn" class="btn-primary">Filtriraj</button>
            <button id="resetBtn" class="back-btn">Reset</button>
        </div>

        <p id="stats" class="stats-text"></p>
        <div id="loading" class="loading-state">Učitavanje venuea...</div>
        <div id="clubCards" class="card-grid"></div>
        <div id="empty" class="no-access hidden">
            <p id="emptyMsg">Dohvat podataka s Ticketmastera u tijeku, pričekaj trenutak...</p>
        </div>
    </div>

    <script>
        let pollTimer = null;
        let pollCount = 0;
        const POLL_INTERVAL_MS = 10000; // provjeri svakih 10s dok baza ne dobije podatke
        const MAX_POLLS = 30;           // odustaj nakon 5 min

        function checkUser() {
            const username = localStorage.getItem('username');
            if (!username) {
                window.location.href = '/index.html';
                return;
            }
            document.getElementById('userDisplay').textContent = username;
        }

        async function loadCities() {
            try {
                const res = await fetch('/api/cities');
                const data = await res.json();
                const select = document.getElementById('countryFilter');
                const seen = new Set();
                (data.cities || []).forEach(c => {
                    if (!c.country || seen.has(c.country)) return;
                    seen.add(c.country);
                    const opt = document.createElement('option');
                    opt.value = c.country;
                    opt.textContent = c.country;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.warn('Cities fetch failed', e);
            }
        }

        async function loadClubs(silent = false) {
            const city = document.getElementById('cityFilter').value.trim();
            const country = document.getElementById('countryFilter').value.trim();
            const params = new URLSearchParams();
            if (city) params.set('city', city);
            if (country) params.set('country', country);

            const loadingEl = document.getElementById('loading');
            const emptyEl = document.getElementById('empty');
            const cardsEl = document.getElementById('clubCards');

            if (!silent) {
                loadingEl.style.display = 'block';
                emptyEl.classList.add('hidden');
                cardsEl.innerHTML = '';
            }

            try {
                const res = await fetch(`/api/clubs?${params.toString()}`);
                const data = await res.json();
                loadingEl.style.display = 'none';

                const clubs = data.clubs || [];

                if (clubs.length === 0) {
                    emptyEl.classList.remove('hidden');
                    schedulePoll();
                    return;
                }

                // Ima klubova — zaustavi polling, osvježi prikaz
                stopPoll();
                emptyEl.classList.add('hidden');

                document.getElementById('stats').textContent =
                    `Pronađeno ${clubs.length} venuea`;

                // Osvježi dropdown ako je novi grad/zemlja stigao
                loadCities();

                cardsEl.innerHTML = '';
                clubs.forEach(club => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => {
                        window.location.href =
                            `/events.html?club_id=${encodeURIComponent(club.id)}&club_name=${encodeURIComponent(club.name)}`;
                    };

                    const title = document.createElement('div');
                    title.className = 'card-title';
                    title.textContent = club.name || 'Unknown venue';

                    const subtitle = document.createElement('div');
                    subtitle.className = 'card-subtitle';
                    const loc = club.location ||
                        [club.city, club.country].filter(Boolean).join(', ');
                    subtitle.textContent = '📍 ' + (loc || 'Lokacija: nepoznata');

                    const badge = document.createElement('div');
                    badge.className = 'card-badge';
                    badge.textContent = `🎟️ ${club.event_count || 0} eventa`;

                    const text = document.createElement('div');
                    text.className = 'card-text';
                    text.textContent = club.description || 'Bez opisa.';

                    card.appendChild(title);
                    card.appendChild(subtitle);
                    card.appendChild(badge);
                    card.appendChild(text);
                    cardsEl.appendChild(card);
                });
            } catch (err) {
                console.error('Greška pri dohvaćanju klubova:', err);
                if (!silent) loadingEl.textContent = 'Greška pri dohvaćanju.';
            }
        }

        function schedulePoll() {
            if (pollTimer !== null) return; // već aktivno
            if (pollCount >= MAX_POLLS) {
                document.getElementById('emptyMsg').textContent =
                    'Nema podataka. Provjeri je li pipeline pokrenut (docker compose logs analytics_worker).';
                return;
            }
            pollCount++;
            const dots = '.'.repeat((pollCount % 3) + 1);
            document.getElementById('emptyMsg').textContent =
                `Dohvat podataka s Ticketmastera u tijeku${dots} (provjera za 10s)`;
            pollTimer = setTimeout(() => {
                pollTimer = null;
                loadClubs(true);
            }, POLL_INTERVAL_MS);
        }

        function stopPoll() {
            if (pollTimer !== null) {
                clearTimeout(pollTimer);
                pollTimer = null;
            }
            pollCount = 0;
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('username');
            window.location.href = '/index.html';
        });
        document.getElementById('filterBtn').addEventListener('click', () => {
            stopPoll();
            loadClubs();
        });
        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('cityFilter').value = '';
            document.getElementById('countryFilter').value = '';
            stopPoll();
            loadClubs();
        });
        document.getElementById('cityFilter').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { stopPoll(); loadClubs(); }
        });

        checkUser();
        loadCities();
        loadClubs();
    </script>
</body>
</html>
