<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button id="backBtn" class="back-btn">← Natrag</button>
            <h2 id="clubTitle"></h2>
        </div>
        <p id="stats" class="stats-text"></p>
        <div id="loading" class="loading-state">Učitavanje eventa...</div>
        <div id="eventCards" class="event-grid"></div>
        <div id="empty" class="no-access hidden">
            <p>Nema dostupnih eventa za ovaj venue.</p>
        </div>
    </div>

    <script>
        function checkUser() {
            if (!localStorage.getItem('username')) {
                window.location.href = '/index.html';
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const clubId = urlParams.get('club_id');
        const clubName = urlParams.get('club_name') || 'Venue';

        document.getElementById('clubTitle').textContent = clubName;
        document.getElementById('backBtn').onclick = () => window.location.href = '/clubs.html';

        function formatDate(ev) {
            const raw = ev.event_date || ev.date || ev.event_date_local;
            if (!raw) return 'Datum: nepoznat';
            try {
                const d = new Date(raw);
                if (isNaN(d.getTime())) return raw;
                return d.toLocaleString('hr-HR', {
                    weekday: 'short', day: '2-digit', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit',
                });
            } catch { return raw; }
        }

        async function loadEvents() {
            const loadingEl = document.getElementById('loading');
            const emptyEl = document.getElementById('empty');
            const cardsEl = document.getElementById('eventCards');
            loadingEl.style.display = 'block';
            emptyEl.classList.add('hidden');
            cardsEl.innerHTML = '';

            try {
                const res = await fetch(`/api/clubs/${encodeURIComponent(clubId)}/events`);
                const data = await res.json();
                loadingEl.style.display = 'none';

                const events = data.events || [];
                document.getElementById('stats').textContent =
                    events.length ? `${events.length} dostupnih eventa` : '';

                if (events.length === 0) {
                    emptyEl.classList.remove('hidden');
                    return;
                }

                events.forEach(ev => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.onclick = (e) => {
                        // ne reagiraj na klik na vanjski link
                        if (e.target.tagName === 'A') return;
                        const eid = ev.id || ev.ticketmaster_id;
                        window.location.href =
                            `/buy-ticket.html?event_id=${encodeURIComponent(eid)}&event_name=${encodeURIComponent(ev.name)}&club_name=${encodeURIComponent(clubName)}`;
                    };

                    if (ev.image_url) {
                        const img = document.createElement('img');
                        img.src = ev.image_url;
                        img.alt = ev.name;
                        img.className = 'event-image';
                        img.loading = 'lazy';
                        card.appendChild(img);
                    }

                    const body = document.createElement('div');
                    body.className = 'event-body';

                    const title = document.createElement('div');
                    title.className = 'card-title';
                    title.textContent = ev.name || 'Event';
                    body.appendChild(title);

                    if (ev.artist_name && ev.artist_name !== ev.name) {
                        const artist = document.createElement('div');
                        artist.className = 'card-subtitle';
                        artist.textContent = '🎤 ' + ev.artist_name;
                        body.appendChild(artist);
                    }

                    const date = document.createElement('div');
                    date.className = 'card-subtitle';
                    date.textContent = '📅 ' + formatDate(ev);
                    body.appendChild(date);

                    const loc = document.createElement('div');
                    loc.className = 'card-subtitle';
                    loc.textContent = '📍 ' + [ev.venue_name, ev.city, ev.country].filter(Boolean).join(', ');
                    body.appendChild(loc);

                    if (ev.base_price) {
                        const price = document.createElement('div');
                        price.className = 'event-price';
                        const cur = ev.current_price ?? ev.base_price;
                        price.innerHTML = `💶 <strong>${Number(cur).toFixed(2)} EUR</strong>`;
                        if (ev.base_price && cur > ev.base_price * 1.2) {
                            price.innerHTML += ' <span class="hot-badge">🔥 visoka potražnja</span>';
                        }
                        body.appendChild(price);
                    }

                    if (ev.genre_name && ev.genre_name !== 'other') {
                        const tag = document.createElement('span');
                        tag.className = 'genre-tag';
                        tag.textContent = ev.tm_genre || ev.genre_name;
                        body.appendChild(tag);
                    }

                    if (ev.url) {
                        const link = document.createElement('a');
                        link.href = ev.url;
                        link.target = '_blank';
                        link.rel = 'noopener';
                        link.className = 'tm-link';
                        link.textContent = '↗ Ticketmaster';
                        body.appendChild(link);
                    }

                    card.appendChild(body);
                    cardsEl.appendChild(card);
                });
            } catch (err) {
                console.error('Greška pri dohvatu eventa:', err);
                loadingEl.textContent = 'Greška pri učitavanju.';
            }
        }

        checkUser();
        loadEvents();
    </script>
</body>
</html>
