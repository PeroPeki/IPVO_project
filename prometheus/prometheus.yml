global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "backend"
    static_configs:
      - targets: ["backend:5000"]

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8082"]

  - job_name: "prediction_service"
    static_configs:
      - targets: ["prediction_service:6000"]
    scrape_interval: 15s
